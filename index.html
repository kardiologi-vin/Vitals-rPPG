<!DOCTYPE html>
<html>
<head>
    <title>Klinisk rPPG Monitor</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        #container { margin-top: 20px; }
        video { border-radius: 10px; background: #000; width: 80%; max-width: 400px; }
        #results { font-size: 24px; font-weight: bold; color: #1a73e8; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>rPPG Forskningsverktyg</h1>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <div id="results">Initialiserar sensor...</div>
        <canvas id="output" style="display:none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const results = document.getElementById('results');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');

        let gValues = [];

        // Starta kameran
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; });

        function processFrame() {
            if (video.paused || video.ended) return;
            
            // Analysera center av bilden (pannan)
            canvas.width = 10; canvas.height = 10;
            ctx.drawImage(video, video.videoWidth/2-25, video.videoHeight/4, 50, 50, 0, 0, 10, 10);
            const data = ctx.getImageData(0, 0, 10, 10).data;
            
            let greenSum = 0;
            for (let i = 1; i < data.length; i += 4) greenSum += data[i];
            gValues.push(greenSum / (data.length / 4));

            if (gValues.length > 300) { // Ca 10 sekunder data
                // Enkel frekvensanalys för Puls
                results.innerText = "Analyserar vågform...";
                // Här kan vi addera mer avancerad matematik (FFT) senare
                if(gValues.length > 600) gValues.shift();
            } else {
                results.innerText = `Kalibrerar: ${Math.round(gValues.length/3)}%`;
            }
            requestAnimationFrame(processFrame);
        }
        video.addEventListener('play', processFrame);
    </script>
</body>
</html>
